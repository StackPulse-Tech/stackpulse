name: StackPulse Pipeline

on:
  schedule:
    - cron: '0 6 * * *'      # Collect + evaluate daily at 6 AM UTC
    - cron: '0 8 * * 1'      # Generate digest every Monday at 8 AM UTC
  workflow_dispatch:          # Manual trigger

jobs:
  collect:
    name: Collect & Evaluate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Collect tools
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python pipeline/collect.py

      - name: Evaluate tools
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python pipeline/evaluate.py

  digest:
    name: Generate Weekly Digest
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && contains(github.event.schedule, '0 8 * * 1'))
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate digest draft
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUB_ID: ${{ secrets.BEEHIIV_PUB_ID }}
        run: python pipeline/digest.py

      - name: Commit digest to repo (manual review mode)
        if: ${{ !env.BEEHIIV_API_KEY }}
        env:
          BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
        run: |
          git config user.name "StackPulse Bot"
          git config user.email "getstackpulse@gmail.com"
          git add digests/
          git diff --staged --quiet || git commit -m "digest: $(date +%Y-%m-%d) — pending manual publish"
          git push
